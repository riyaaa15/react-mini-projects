<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="w-4/5 border-2 border-black rounded-md">
    <div class="bg-gradient-to-b from-sky-500 to-indigo-500 text-white h-20 flex justify-center items-center">
        News you can Trust.
    </div>
    
   <div class="flex items-center flex-col m-4">
    <h3 class="font-bold mt-2">Stay up to date with the Latest!</h3>
    
    <p>Subscribe to our newsletter for the latest news straight into your inbox</p>
    
    <input class="bg-gray-200 w-64 pl-3 py-1 m-2 rounded" 
    type="email" 
    placeholder="you@example.com"/>
    
    <button class="rounded-full w-64 p-1 bg-blue-500 text-white">
        Subscribe Now
    </button>
    
    <p class="m-3">We value your privacy</p>
</div>
   </div>
</body>
</html>
